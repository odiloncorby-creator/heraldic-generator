<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blason terminal — vvd.world</title>
<style>
  :root {
    --color-bg: #0A0A0A;
    --color-a: #6B7EC4;
    --color-b: #8A9AD4;
    --color-hazard: #E61919;
  }
  html, body {
    margin: 0; min-height: 100dvh;
    background: var(--color-bg); color: var(--color-b);
    font-family: monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; box-sizing: border-box;
  }
  /* UI détaillée en T10 */
</style>
</head>
<body>
  <!-- DOM détaillé en T10 -->

  <script id="blason-script">
    const COLS = 80;
    const ROWS = 50;
    const DOT_W = COLS * 2;   // 160
    const DOT_H = ROWS * 4;   // 200

    function hashString(text) {
      let hash = 5381;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) + hash) + text.charCodeAt(i);
        hash = hash >>> 0;
      }
      return hash >>> 0;
    }

    function mulberry32(seed) {
      let a = seed >>> 0;
      return function () {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function slugify(text) {
      const slug = text
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40);
      return slug.length > 0 ? slug : 'blason';
    }

    // Export incrémental : évite qu'une ligne d'export partagée soit éditée par
    // plusieurs tâches (source de conflits). Chaque tâche AJOUTE son propre bloc
    // Object.assign JUSTE après ses fonctions, à l'ancre PURE ci-dessous.
    if (typeof module !== 'undefined' && module.exports) {
      Object.assign(module.exports, { COLS, ROWS, DOT_W, DOT_H, hashString, mulberry32, slugify });
    }

    // <<< ANCHOR:PURE — T1–T7 insèrent ici (append uniquement, ne jamais réordonner).
    //     Modèle par tâche : définir la/les fonction(s), puis, juste dessous :
    //     if (typeof module !== 'undefined' && module.exports) Object.assign(module.exports, { maFonction }); >>>

    function escapeXml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function serializeSvg(grid, opts) {
      opts = opts || {};
      const cw = opts.cellW || 13.5, ch = opts.cellH || 27, fs = opts.fontSize || 24;
      const w = grid.cols * cw, h = grid.rows * ch;
      let out = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
      out += `<rect width="${w}" height="${h}" fill="#0A0A0A"/>`;
      out += `<g font-family="monospace" font-size="${fs}" xml:space="preserve">`;
      for (let r = 0; r < grid.rows; r++) {
        const y = ((r + 0.8) * ch).toFixed(1);
        for (let c = 0; c < grid.cols; c++) {
          const cell = grid.cells[r][c];
          if (cell.char === ' ' || cell.char === '⠀') continue;
          const x = (c * cw).toFixed(1);
          out += `<text x="${x}" y="${y}" fill="${cell.color}">${escapeXml(cell.char)}</text>`;
        }
      }
      out += `</g></svg>`;
      return out;
    }

    if (typeof module !== 'undefined' && module.exports) {
      Object.assign(module.exports, { escapeXml, serializeSvg });
    }
  </script>

  <script id="blason-ui">
    // <<< ANCHOR:UI — T8–T11 insèrent leur câblage DOM ici (append uniquement). >>>
  </script>
</body>
</html>
