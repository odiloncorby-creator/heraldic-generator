<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blason terminal — vvd.world</title>
<style>
  :root {
    --color-bg: #0A0A0A;
    --color-a: #6B7EC4;
    --color-b: #8A9AD4;
    --color-hazard: #E61919;
  }
  html, body {
    margin: 0; min-height: 100dvh;
    background: var(--color-bg); color: var(--color-b);
    font-family: monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; box-sizing: border-box;
  }
  /* UI détaillée en T10 */
</style>
</head>
<body>
  <!-- DOM détaillé en T10 -->

  <script id="blason-script">
    const COLS = 80;
    const ROWS = 50;
    const DOT_W = COLS * 2;   // 160
    const DOT_H = ROWS * 4;   // 200

    function hashString(text) {
      let hash = 5381;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) + hash) + text.charCodeAt(i);
        hash = hash >>> 0;
      }
      return hash >>> 0;
    }

    function mulberry32(seed) {
      let a = seed >>> 0;
      return function () {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function slugify(text) {
      const slug = text
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40);
      return slug.length > 0 ? slug : 'blason';
    }

    // Export incrémental : évite qu'une ligne d'export partagée soit éditée par
    // plusieurs tâches (source de conflits). Chaque tâche AJOUTE son propre bloc
    // Object.assign JUSTE après ses fonctions, à l'ancre PURE ci-dessous.
    if (typeof module !== 'undefined' && module.exports) {
      Object.assign(module.exports, { COLS, ROWS, DOT_W, DOT_H, hashString, mulberry32, slugify });
    }

    function overlayStructural(cells, params, meta) {
      const rows = cells.length, cols = cells[0].length;
      const put = (r, c, ch, layer) => {
        if (r >= 0 && r < rows && c >= 0 && c < cols) {
          cells[r][c] = { char: ch, intensity: 1, layer: layer || 'struct' };
        }
      };
      // Cadre
      if (params.frame === 'box') {
        for (let c = 0; c < cols; c++) { put(0, c, '─'); put(rows - 1, c, '─'); }
        for (let r = 0; r < rows; r++) { put(r, 0, '│'); put(r, cols - 1, '│'); }
        put(0, 0, '┌'); put(0, cols - 1, '┐'); put(rows - 1, 0, '└'); put(rows - 1, cols - 1, '┘');
      } else if (params.frame === 'brackets') {
        put(0, 0, '['); put(0, cols - 1, ']'); put(rows - 1, 0, '['); put(rows - 1, cols - 1, ']');
      } else { // ticks
        for (let c = 0; c < cols; c += 8) { put(0, c, '+'); put(rows - 1, c, '+'); }
      }
      // Crosshairs aux intersections internes
      for (let r = 6; r < rows - 6; r += 12) {
        for (let c = 8; c < cols - 8; c += 16) put(r, c, '+');
      }
      // Ligne de données (avant-dernière ligne)
      const hex = (meta.seed >>> 0).toString(16).toUpperCase().padStart(8, '0');
      const label = `SEED 0x${hex}  REV ${meta.rev}  ${meta.unit}`;
      const start = 2;
      for (let i = 0; i < label.length && start + i < cols - 2; i++) {
        put(rows - 2, start + i, label[i], 'data');
      }
      return cells;
    }

    if (typeof module !== 'undefined' && module.exports) {
      Object.assign(module.exports, { overlayStructural });
    }

    // <<< ANCHOR:PURE — T1–T7 insèrent ici (append uniquement, ne jamais réordonner).

    //     if (typeof module !== 'undefined' && module.exports) Object.assign(module.exports, { maFonction }); >>>
  </script>

  <script id="blason-ui">

  </script>
</body>
</html>
